services:
  - type: web
    name: virtual-tryon-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tryon-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: SEGMIND_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

databases:
  - name: tryon-db
    databaseName: tryondb
    user: tryonuser
